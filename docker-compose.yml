# Local Postgres for Academia Digital development.
#
# Usage:
#   docker compose up -d         # start Postgres in background
#   docker compose down          # stop
#   docker compose down -v       # stop and DELETE all data
#
# After `up`, run:
#   npm run db:push   # creates schema
#   npm run db:seed   # inserts Oporto Forte sample data
#   npm run db:studio # opens Prisma Studio at http://localhost:5555

services:
  postgres:
    image: postgres:16-alpine
    container_name: academia-digital-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: academia_digital
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d academia_digital"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: academia-digital-pgdata
